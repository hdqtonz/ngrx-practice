<app-header></app-header>
@if (showLoading | async) {
  <app-loading-spinner></app-loading-spinner>
}
<div class="container">
  <div class="row">
    <div class="col-12">
      <!-- error start -->
      @if ((showError | async).length) {
        <div class="alert alert-danger">{{ showError | async }}</div>
      }
      <!-- error end -->
      <router-outlet />
    </div>
  </div>
</div>
